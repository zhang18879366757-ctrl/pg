<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANT LABS - 5.5 Stable</title>
    <style>
        :root { --gold: #ffd700; --pirate-red: #991b1b; }
        body { margin: 0; background: #080503; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .header { width: 100%; max-width: 440px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .portfolio { border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; font-weight: bold; color: var(--gold); }
        
        /* 强制定义高度，解决移动端黑屏 */
        .arcade-cabinet { width: 92%; max-width: 410px; background: #170d07; border: 3px solid #5c351a; border-radius: 12px; padding: 10px; box-sizing: border-box; min-height: 350px; }
        .matrix-viewport { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #000; padding: 5px; border-radius: 8px; border: 2px solid var(--gold); min-height: 240px; }
        .reel-col { position: relative; height: 240px; overflow: hidden; display: flex; flex-direction: column; }
        .symbol-cell { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-bottom: 1px solid #222; }
        
        .exec-btn { width: 100%; background: linear-gradient(180deg, #ff5533, #bd1c00); border: none; color: white; padding: 15px; margin-top: 15px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; }
        .led-screen { margin: 15px 0; font-size: 0.9rem; color: #30d158; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900;">QUANT_LABS // 5.5</div>
        <div class="portfolio">资产: $<span id="ui-balance">1000</span></div>
    </div>

    <div class="arcade-cabinet" id="cabinet">
        <div class="matrix-viewport" id="viewport">
            <div class="reel-col" id="col-0"></div>
            <div class="reel-col" id="col-1"></div>
            <div class="reel-col" id="col-2"></div>
            <div class="reel-col" id="col-3"></div>
            <div class="reel-col" id="col-4"></div>
        </div>
        <div class="led-screen" id="ui-log">正在初始化海域...</div>
        <button class="exec-btn" id="ui-spin">拉动船舵 SPIN</button>
    </div>

    <script>
        // 核心引擎类
        class PirateCascadeEngine {
            constructor() {
                this.pool = ['👩‍🎤', '🗺️', '🔫', '🧭', '🅰️', '🅺'];
                this.cols = [0,1,2,3,4].map(i => document.getElementById(`col-${i}`));
                this.initBoard();
                document.getElementById('ui-spin').onclick = () => this.spin();
            }

            initBoard() {
                this.cols.forEach(col => {
                    col.innerHTML = '';
                    for(let i=0; i<3; i++) {
                        let div = document.createElement('div');
                        div.className = 'symbol-cell';
                        div.innerText = this.pool[Math.floor(Math.random() * this.pool.length)];
                        col.appendChild(div);
                    }
                });
                document.getElementById('ui-log').innerText = "海域准备就绪！";
            }

            spin() {
                this.initBoard();
                document.getElementById('ui-log').innerText = "炮火齐鸣！级联消除触发...";
            }
        }

        // 强力加载策略：防止移动端因渲染太快导致的容器黑屏
        const boot = () => {
            if (document.getElementById('viewport').clientHeight > 0) {
                window.engine = new PirateCascadeEngine();
            } else {
                // 如果容器还没长高，轮询重试
                setTimeout(boot, 50);
            }
        };

        // DOM加载完成后尝试启动
        window.addEventListener('DOMContentLoaded', boot);
    </script>
</body>
</html>
