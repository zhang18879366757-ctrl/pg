<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>旋转老虎机</title>
    <style>
        /* 基础重置与安全区域布局 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #2c3e50;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* 适配移动端安全区域，防止UI被刘海或底部小白条遮挡 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        /* 老虎机主控台样式 */
        .slot-machine {
            background: #e74c3c;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4), inset 0 5px 0 rgba(255,255,255,0.2);
            text-align: center;
        }

        /* 卷轴容器 */
        .reels-container {
            display: flex;
            gap: 15px;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.8);
        }

        /* 单个卷轴窗口 */
        .reel {
            width: 80px;
            height: 100px;
            background: #ecf0f1;
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 隐藏超出窗口的符号 */
            position: relative;
        }

        /* 卷轴内部用于滑动的长条 */
        .reel-content {
            display: flex;
            flex-direction: column;
            /* 动画将通过 JS 动态注入以控制时长 */
        }

        /* 单个符号 */
        .symbol {
            height: 100px; /* 必须与卷轴窗口高度一致 */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 交互按钮 */
        button {
            background: #f1c40f;
            border: none;
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            color: #d35400;
            cursor: pointer;
            box-shadow: 0 6px 0 #d35400;
            transition: all 0.1s;
            /* 优化移动端点击体验 */
            min-height: 55px;
            touch-action: manipulation; 
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #d35400;
        }

        button:disabled {
            background: #95a5a6;
            color: #7f8c8d;
            box-shadow: 0 6px 0 #7f8c8d;
            cursor: not-allowed;
            transform: translateY(6px);
        }

        /* 结果信息展示 */
        #message {
            margin-top: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            min-height: 35px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="slot-machine">
        <div class="reels-container">
            <div class="reel"><div class="reel-content" id="reel1"></div></div>
            <div class="reel"><div class="reel-content" id="reel2"></div></div>
            <div class="reel"><div class="reel-content" id="reel3"></div></div>
        </div>
        <button id="spinBtn">SPIN</button>
        <div id="message"></div>
    </div>

    <script>
        // 游戏配置
        const symbols = ['🍒', '🍋', '🍉', '⭐', '🔔', '💎', '7️⃣'];
        const SYMBOL_HEIGHT = 100; // 与 CSS 中 .symbol 的 height 保持一致
        
        const reels = [
            document.getElementById('reel1'), 
            document.getElementById('reel2'), 
            document.getElementById('reel3')
        ];
        const spinBtn = document.getElementById('spinBtn');
        const messageEl = document.getElementById('message');

        // 页面加载时初始化卷轴展示面
        function initReels() {
            reels.forEach(reel => {
                reel.innerHTML = '';
                const startSymbol = document.createElement('div');
                startSymbol.className = 'symbol';
                startSymbol.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                reel.appendChild(startSymbol);
            });
        }

        // 核心旋转逻辑
        function spin() {
            if (spinBtn.disabled) return;
            spinBtn.disabled = true;
            messageEl.textContent = '';

            const results = [];
            let completedReels = 0;

            reels.forEach((reel, index) => {
                // 1. 生成视觉欺骗用的长列表序列 (每一列多转几圈，形成视差落差)
                const spinCount = 20 + index * 10; 
                const targetSymbolIndex = Math.floor(Math.random() * symbols.length);
                const targetSymbol = symbols[targetSymbolIndex];
                results.push(targetSymbol);

                let reelHtml = '';
                // 填充随机滚动过程的符号
                for (let i = 0; i < spinCount; i++) {
                    reelHtml += `<div class="symbol">${symbols[Math.floor(Math.random() * symbols.length)]}</div>`;
                }
                // 在列表最末尾追加目标结果
                reelHtml += `<div class="symbol">${targetSymbol}</div>`;
                
                // 2. 状态重置 (瞬间回到顶部)
                reel.style.transition = 'none';
                reel.style.transform = 'translateY(0)';
                reel.innerHTML = reelHtml;

                // 强制浏览器重绘 (Reflow)，确保瞬间归零生效后再执行后续动画
                reel.offsetHeight; 

                // 3. 触发 CSS 过渡动画滚动到底部
                const duration = 2.5 + index * 0.6; // 从左到右依次停下
                // 使用 cubic-bezier(0.25, 1, 0.5, 1) 模拟慢慢停稳的物理阻尼效果
                reel.style.transition = `transform ${duration}s cubic-bezier(0.25, 1, 0.5, 1)`;
                const offset = -(spinCount * SYMBOL_HEIGHT); 
                reel.style.transform = `translateY(${offset}px)`;

                // 4. 监听该列动画结束
                setTimeout(() => {
                    completedReels++;
                    if (completedReels === 3) {
                        checkWin(results);
                        spinBtn.disabled = false;
                    }
                }, duration * 1000);
            });
        }

        // 结算逻辑
        function checkWin(results) {
            if (results[0] === results[1] && results[1] === results[2]) {
                messageEl.textContent = '🎉 大奖！(JACKPOT) 🎉';
                messageEl.style.color = '#f1c40f';
            } else if (results[0] === results[1] || results[1] === results[2] || results[0] === results[2]) {
                messageEl.textContent = '不错！差一点点！';
                messageEl.style.color = '#ecf0f1';
            } else {
                messageEl.textContent = '再试一次！';
                messageEl.style.color = '#bdc3c7';
            }
        }

        // 绑定事件
        spinBtn.addEventListener('click', spin);
        initReels();
    </script>
</body>
</html>
